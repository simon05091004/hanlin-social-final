services:
  - type: web
    name: hanlin-social-final
    runtime: python
    buildCommand: ""
    startCommand: "python server.py"
    healthCheckPath: /healthz
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_PATH
        value: /var/data/quiz_records.sqlite3
      - key: PUBLIC_BASE_URL
        sync: false
    disk:
      name: quiz-records
      mountPath: /var/data
      sizeGB: 1
